# fly.toml app configuration file generated for tpm-drift-detector on 2026-07-04T16:30:23-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tpm-drift-detector'
primary_region = 'iad'

[build]

[env]
  DB_PATH = '/data/drift.db'
  DRY_RUN = 'false'
  PROJECT_KEY = 'RC1'

[[mounts]]
  source = 'drift_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
